# Defense layers: fast builtin checks at commit, slow external checks before push.
# Install: prek install
default_install_hook_types = ["pre-commit", "pre-push"]
default_stages = ["pre-push"]

# ── Layer 1: Fast hygiene (every commit, < 1s, Rust-native builtins) ─────────
[[repos]]
repo = "builtin"
hooks = [
  { id = "no-commit-to-branch", stages = ["pre-commit"], args = ["-b", "main", "-b", "staging"] },
  { id = "check-added-large-files", stages = ["pre-commit"], args = ["--maxkb=1024"] },
  { id = "check-merge-conflict", stages = ["pre-commit"] },
  { id = "check-yaml", stages = ["pre-commit"], exclude = "^(helm|skylit-airflow/helm)/.*templates/" },
  { id = "check-json", stages = ["pre-commit"] },
  { id = "check-toml", stages = ["pre-commit"] },
  { id = "detect-private-key", stages = ["pre-commit"] },
  { id = "trailing-whitespace", stages = ["pre-commit"], args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer", stages = ["pre-commit"] },
  { id = "fix-byte-order-marker", stages = ["pre-commit"] },
  { id = "check-symlinks", stages = ["pre-commit"] },
]
